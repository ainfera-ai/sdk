name: live-smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sdk-live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: SDK signup + inference against production
        env:
          AINFERA_API_BASE: https://api.ainfera.ai
        run: bash scripts/live-smoke.sh
