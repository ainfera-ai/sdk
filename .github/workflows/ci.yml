name: hygiene

on:
  pull_request:
  push:
    branches: [main]

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify required community files
        run: |
          set -e
          for f in README.md LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md .github/CODEOWNERS; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::required community file missing"
              exit 1
            fi
          done
          echo "All required community files present."
